<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS ARENA — PC Gaming Cafe</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050810; --bg2: #080d1a; --bg3: #0d1525;
    --cyan: #00f5ff; --cyan-dim: rgba(0,245,255,0.15); --cyan-glow: rgba(0,245,255,0.4);
    --orange: #ff6b2b; --orange-dim: rgba(255,107,43,0.15);
    --white: #e8eaf0; --gray: #6b7a99;
    --card-bg: rgba(13,21,37,0.9); --border: rgba(0,245,255,0.12); --border-hot: rgba(0,245,255,0.5);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--white); font-family: 'Rajdhani', sans-serif; overflow-x: hidden; cursor: none; }

  /* CUSTOM CURSOR */
  .cursor { width: 8px; height: 8px; background: var(--cyan); border-radius: 50%; position: fixed; top:0; left:0; pointer-events: none; z-index: 9999; transition: transform 0.1s; box-shadow: 0 0 10px var(--cyan), 0 0 20px var(--cyan-glow); }
  .cursor-ring { width: 32px; height: 32px; border: 1px solid var(--cyan-glow); border-radius: 50%; position: fixed; top:0; left:0; pointer-events: none; z-index: 9998; transition: transform 0.12s; }

  /* SCANLINES & NOISE */
  body::before { content:''; position:fixed; inset:0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events:none; z-index:0; opacity:0.4; }
  body::after { content:''; position:fixed; inset:0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,245,255,0.015) 2px, rgba(0,245,255,0.015) 4px); pointer-events:none; z-index:1; }

  /* NAV */
  nav { position: fixed; top:0; left:0; right:0; z-index: 100; padding: 0 5%; display: flex; align-items:center; justify-content:space-between; height: 72px; background: rgba(5,8,16,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
  .nav-logo { font-family: 'Orbitron', monospace; font-weight: 900; font-size: 1.3rem; letter-spacing: 4px; color: var(--white); text-decoration: none; }
  .nav-logo span { color: var(--cyan); }
  .nav-links { display: flex; gap: 40px; list-style: none; }
  .nav-links a { font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase; color: var(--gray); text-decoration: none; transition: color 0.2s; position: relative; }
  .nav-links a:hover { color: var(--white); }
  .nav-cta { border: 1px solid var(--cyan); color: var(--cyan); font-family: 'Orbitron', monospace; font-size: 0.7rem; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; padding: 10px 22px; cursor: none; transition: all 0.25s; text-decoration: none; }
  .nav-cta:hover { background: var(--cyan); color: var(--bg); }

  /* HERO */
  .hero { min-height: 100vh; display: flex; align-items: center; padding: 100px 5% 60px; position: relative; overflow: hidden; }
  .hero-grid-bg { position: absolute; inset:0; background-image: linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px); background-size: 60px 60px; mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 100%); }
  .hero-content { position:relative; z-index:2; max-width: 760px; }
  .hero-badge { display: inline-flex; align-items:center; gap:8px; border: 1px solid var(--border-hot); padding: 6px 16px; font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; color: var(--cyan); letter-spacing: 2px; margin-bottom: 30px; }
  .hero-title { font-family: 'Orbitron', monospace; font-weight: 900; font-size: clamp(3rem, 8vw, 7rem); line-height: 0.95; margin-bottom: 8px; }
  .hero-title .accent { color: var(--cyan); }
  .hero-sub { font-size: 1.15rem; color: var(--gray); line-height: 1.6; max-width: 480px; margin: 28px 0 48px; }

  /* SECTIONS SHARED */
  section { padding: 100px 5%; position: relative; z-index: 2; }
  .section-label { font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; letter-spacing: 4px; color: var(--cyan); text-transform: uppercase; margin-bottom: 12px; }
  .section-title { font-family: 'Orbitron', monospace; font-weight: 800; font-size: clamp(1.8rem, 4vw, 3rem); margin-bottom: 16px; }
  .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--border-hot), transparent); margin: 0 5%; }

  /* PRICING DYNAMIC CARDS */
  .pricing-wrap { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 60px; }
  .price-card { border: 1px solid var(--border); background: var(--card-bg); padding: 40px 32px; position: relative; transition: transform 0.3s; }
  .price-card.featured { border-color: var(--cyan); background: rgba(0,245,255,0.05); }
  .price-card.featured::before { content: 'MOST POPULAR'; position:absolute; top:0; right:0; background: var(--cyan); color: var(--bg); font-family: 'Orbitron', monospace; font-size: 0.6rem; font-weight: 700; padding: 5px 14px; }
  .price-amount { font-family: 'Orbitron', monospace; font-weight: 900; font-size: 3rem; color: var(--white); }
  .price-amount sup { font-size: 1.2rem; color: var(--cyan); }
  .price-features { list-style: none; margin: 20px 0 36px; }
  .price-features li { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; color: var(--gray); }

  /* EVENTS */
  .events-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 60px; }
  .event-card { border: 1px solid var(--border); background: var(--card-bg); padding: 28px; transition: 0.3s; }
  .event-game { font-family: 'Orbitron', monospace; font-weight: 700; font-size: 1.2rem; color: var(--white); }
  .event-prize { color: var(--orange); font-family: 'Orbitron', monospace; font-weight: 700; margin-top: 5px; }
  .event-tag { display: inline-block; padding: 4px 12px; font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; background: var(--orange-dim); color: var(--orange); margin-top: 15px; border: 1px solid var(--orange); }

  /* MENU TABS */
  .menu-tabs { display: flex; gap: 10px; border-bottom: 1px solid var(--border); overflow-x: auto; margin-top: 40px; }
  .tab-btn { background: none; border: none; padding: 15px 30px; color: var(--gray); font-family: 'Orbitron', monospace; cursor: none; font-size: 0.8rem; }
  .tab-btn.active { color: var(--cyan); border-bottom: 2px solid var(--cyan); }
  .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; margin-top: 30px; }
  .menu-item { background: var(--card-bg); border: 1px solid var(--border); padding: 20px; display: flex; justify-content: space-between; }
  .menu-item-price { color: var(--cyan); font-family: 'Orbitron', monospace; font-weight: 700; }

  /* FOOTER */
  footer { padding: 60px 5%; background: var(--bg2); border-top: 1px solid var(--border); text-align: center; }

  @media (max-width: 768px) { .nav-links { display: none; } .hero-title { font-size: 3.5rem; } }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursor-ring"></div>

<nav>
  <a class="nav-logo" href="#"><span>NEX</span>US ARENA</a>
  <ul class="nav-links">
    <li><a href="#pricing">Pricing</a></li>
    <li><a href="#events">Events</a></li>
    <li><a href="#menu">Menu</a></li>
    <li><a href="#booking">Book</a></li>
  </ul>
  <a href="#booking" class="nav-cta">Book Now</a>
</nav>

<section class="hero">
  <div class="hero-grid-bg"></div>
  <div class="hero-content">
    <div class="hero-badge">CAIRO'S PREMIER GAMING CAFE</div>
    <h1 class="hero-title">PLAY AT<br><span class="accent">THE APEX</span></h1>
    <p class="hero-sub">High-performance stations engineered for victory.</p>
  </div>
</section>

<div class="divider"></div>

<section id="pricing">
  <div class="section-label">// Pricing</div>
  <h2 class="section-title">Choose Your Session</h2>
  <div class="pricing-wrap" id="pricing-container">
    <!-- GENERATED BY JS -->
  </div>
</section>

<section id="events" style="background: var(--bg2);">
  <div class="section-label">// Tournaments</div>
  <h2 class="section-title">Active Events</h2>
  <div class="events-grid" id="events-container">
    <!-- GENERATED BY JS -->
  </div>
</section>

<section id="menu">
  <div class="section-label">// Fuel</div>
  <h2 class="section-title">Gaming Menu</h2>
  <div class="menu-tabs" id="menu-tabs-container">
    <!-- GENERATED BY JS -->
  </div>
  <div id="menu-items-container" class="menu-grid">
    <!-- GENERATED BY JS -->
  </div>
</section>

<footer>
  <div class="nav-logo"><span>NEX</span>US ARENA</div>
  <p style="color: var(--gray); margin-top: 10px;">© 2025 All Rights Reserved.</p>
</footer>

<script>
  /***********************************************************
   * OWNER MANAGEMENT SECTION
   * This is the only place you need to edit!
   ***********************************************************/
  
  const CAFE_DATA = {
    pricing: [
      { name: "Solo Drop-in", price: "35", unit: "per hour", features: ["RTX 4080 station", "Full library", "Standard Peripherals"], featured: false },
      { name: "Apex Tier", price: "55", unit: "per hour", features: ["RTX 4090 station", "360Hz Display", "Priority Booking", "VIP Lounge"], featured: true },
      { name: "Squad Pack", price: "180", unit: "per hour (4 seats)", features: ["4 Group Stations", "Private LAN", "Free round of drinks"], featured: false }
    ],
    
    events: [
      { game: "VALORANT", type: "5v5 Tournament", prize: "EGP 2,000", date: "Friday", time: "7:00 PM", tag: "REGISTRATION OPEN" },
      { game: "FC 25", type: "1v1 League", prize: "EGP 1,200", date: "Saturdays", time: "4:00 PM", tag: "8 SPOTS LEFT" },
      { game: "CS2", type: "Open Bracket", prize: "EGP 3,500", date: "Mar 22", time: "6:00 PM", tag: "NEXT EVENT" }
    ],

    menu: {
      Drinks: [
        { name: "seif fuel ⚡", desc: "House energy drink", price: "90" },
        { name: "G-FUEL", desc: "Imported cans", price: "65" },
        { name: "Pixel Lemonade", desc: "Fresh & Blue", price: "40" }
      ],
      Snacks: [
        { name: "Loaded Nachos", desc: "With cheddar & jalapeños", price: "85" },
        { name: "Chicken Pops", desc: "Crispy bites", price: "75" }
      ],
      Meals: [
        { name: "Nexus Burger 🍔", desc: "Double smash patty", price: "130" },
        { name: "XP Bowl", desc: "Teriyaki chicken & rice", price: "110" }
      ]
    }
  };

  /***********************************************************
   * SYSTEM ENGINE (Don't touch unless you know JS)
   ***********************************************************/

  // 1. Render Pricing
  const renderPricing = () => {
    const container = document.getElementById('pricing-container');
    container.innerHTML = CAFE_DATA.pricing.map(item => `
      <div class="price-card ${item.featured ? 'featured' : ''}">
        <div style="font-family:'Orbitron'; font-size:0.7rem; color:var(--gray); letter-spacing:2px;">${item.name}</div>
        <div class="price-amount"><sup>EGP</sup>${item.price}</div>
        <div style="font-size:0.8rem; color:var(--gray);">${item.unit}</div>
        <ul class="price-features">
          ${item.features.map(f => `<li>▸ ${f}</li>`).join('')}
        </ul>
        <a href="#booking" class="nav-cta" style="display:block; text-align:center;">Reserve</a>
      </div>
    `).join('');
  };

  // 2. Render Events
  const renderEvents = () => {
    const container = document.getElementById('events-container');
    container.innerHTML = CAFE_DATA.events.map(e => `
      <div class="event-card">
        <div class="event-game">${e.game}</div>
        <div style="font-family:'Share Tech Mono'; font-size:0.7rem; color:var(--cyan);">${e.type}</div>
        <div class="event-prize">${e.prize}</div>
        <div style="margin-top:15px; font-size:0.8rem; color:var(--gray);">
            📅 ${e.date} at ${e.time}
        </div>
        <div class="event-tag">${e.tag}</div>
      </div>
    `).join('');
  };

  // 3. Render Menu
  const renderMenu = (category = 'Drinks') => {
    const tabsContainer = document.getElementById('menu-tabs-container');
    const itemsContainer = document.getElementById('menu-items-container');
    
    // Render Tabs only once
    if(tabsContainer.innerHTML === "") {
        tabsContainer.innerHTML = Object.keys(CAFE_DATA.menu).map(cat => `
            <button class="tab-btn ${cat === category ? 'active' : ''}" onclick="updateMenu('${cat}', this)">${cat}</button>
        `).join('');
    }

    // Render Items
    itemsContainer.innerHTML = CAFE_DATA.menu[category].map(item => `
      <div class="menu-item">
        <div>
          <div style="font-weight:600;">${item.name}</div>
          <div style="font-size:0.8rem; color:var(--gray);">${item.desc}</div>
        </div>
        <div class="menu-item-price">EGP ${item.price}</div>
      </div>
    `).join('');
  };

  window.updateMenu = (cat, btn) => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderMenu(cat);
  };

  // Init
  renderPricing();
  renderEvents();
  renderMenu();

  // CURSOR LOGIC
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursor-ring');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{
    mx=e.clientX; my=e.clientY;
    cursor.style.transform=`translate(${mx-4}px,${my-4}px)`;
  });
  function animRing(){
    rx+=(mx-rx)*0.12; ry+=(my-ry)*0.12;
    ring.style.transform=`translate(${rx-16}px,${ry-16}px)`;
    requestAnimationFrame(animRing);
  }
  animRing();
</script>
</body>
</html>
